{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Local voice AI therapist call UI">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Voice Therapist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'src/call.css' %}?v=20260318-3">
</head>
<body>
<div class="app-shell">
    <header class="top-bar">
        <div>
            <h1>Voice Therapist</h1>
            <p>Simple local call UI for Ollama + Whisper + Piper</p>
        </div>
        <div class="status-chip" id="sessionStatus" data-tone="idle">Idle</div>
    </header>

    <main class="layout-grid">
        <section class="card controls">
            <h2>Session Controls</h2>
            <div class="btn-row">
                <button id="startSessionBtn" class="btn primary">Start Session</button>
                <button id="endSessionBtn" class="btn danger" disabled>End Session</button>
            </div>

            <div class="btn-row">
                <button id="micBtn" class="btn" disabled>Start Talking</button>
                <div class="indicator-wrap" id="aiIndicatorWrap" data-state="idle">
                    <span class="dot" id="aiDot"></span>
                    <span id="aiIndicatorText">AI idle</span>
                </div>
            </div>

            <div class="field-wrap">
                <label for="assistantResponseField">Assistant Response</label>
                <textarea id="assistantResponseField" rows="6" readonly>Waiting for session to start.</textarea>
                <p id="assistantText" hidden>Waiting for session to start.</p>
            </div>

            <div class="field-wrap">
                <label for="assistantAudio">TTS Playback</label>
                <audio id="assistantAudio" controls></audio>
            </div>

            <div class="field-wrap error-card">
                <div class="error-head">
                    <label for="errorLog">Errors</label>
                    <button id="clearErrorsBtn" class="btn ghost" type="button">Clear</button>
                </div>
                <div id="errorLog" class="error-log" role="status" aria-live="polite">
                    <div class="error-empty">No errors yet.</div>
                </div>
            </div>
        </section>

        <section class="card conversation">
            <h2>Conversation Log</h2>
            <div class="log" id="transcriptLog"></div>
        </section>

        <section class="card presence">
            <h2>Presence</h2>
            <video id="webcamPreview" autoplay playsinline muted></video>
            <div class="visual-signals" id="visualSignals">
                <span>face_detected: unknown</span>
                <span>looking_away: unknown</span>
                <span>low_light: unknown</span>
                <span>user_present: unknown</span>
            </div>
        </section>
    </main>
</div>

<script src="{% static 'src/call.js' %}?v=20260318-3"></script>
</body>
</html>
