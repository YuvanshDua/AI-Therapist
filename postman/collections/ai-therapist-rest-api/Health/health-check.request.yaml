$kind: http-request
name: Health Check
method: GET
url: '{{baseUrl}}/api/health/'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is healthy", () => { pm.response.to.have.status(200); const json = pm.response.json(); pm.expect(json.status).to.eql("healthy"); });
