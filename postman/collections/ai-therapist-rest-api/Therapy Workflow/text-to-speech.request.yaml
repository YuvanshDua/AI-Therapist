$kind: http-request
name: Text to Speech
method: POST
url: '{{baseUrl}}/api/tts/'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "text": "{{last_assistant_text}}",
      "session_id": "{{session_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Audio URL returned", () => { pm.response.to.have.status(200); const json = pm.response.json(); pm.expect(json.audio_url).to.be.a("string"); });
